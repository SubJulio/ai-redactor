<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Теневой AI-редактор</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 400px;
      padding: 20px;
      background: #fff;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    p.subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    h2 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #555;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      outline: none;
      border-color: #2196F3;
    }

    button {
      background: #2196F3;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    button:hover {
      background: #1976D2;
    }

    #saveStatus {
      display: block;
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>🎭 Теневой AI-редактор</h1>
  <p class="subtitle">Настройки API</p>

  <div class="section">
    <div class="form-group">
      <label for="apiKey">API Key Cloud.ru</label>
      <input
        type="password"
        id="apiKey"
        placeholder="Введите API ключ..."
      />
    </div>

    <div class="form-group">
      <label for="apiUrl">API URL</label>
      <input
        type="text"
        id="apiUrl"
        value="https://llm.api.cloud.ru/v1"
      />
    </div>

    <div class="form-group">
      <label for="model">Модель</label>
      <select id="model">
        <option value="zai-org/GLM-4.7">GLM-4.7</option>
        <option value="zai-org/GLM-4.7-Flash">GLM-4.7 Flash</option>
      </select>
    </div>
  </div>

  <button id="save">Сохранить</button>
  <span id="saveStatus"></span>
</body>
</html>
